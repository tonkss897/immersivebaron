<section class="first">

    <h1>Билеты</h1>

      и мы свяжемся с вами для подтверждения брони.
    </p>

<section class="form-block">

  <form>
    <input type="text" placeholder="Ваше имя">
    <input type="tel" placeholder="Номер телефона">

    <select>
      <option>Выберите программу</option>
      <option>Пир Дракона</option>
      <option>Сад Лотоса</option>
      <option>Ритуал Феникса</option>
    </select>

    <input type="number" placeholder="Количество гостей">

    <button type="submit">Отправить</button>
